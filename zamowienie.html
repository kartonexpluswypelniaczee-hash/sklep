<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Złóż Zamówienie - Kartonexplus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .qty-picker-container {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 25px;
            margin: 30px 0;
        }
        .qty-title { font-size: 18px; font-weight: 600; color: #475569; margin-bottom: 15px; }
        .qty-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .qty-control-btn {
            background-color: #2e7d32; color: white; border: none; width: 50px; height: 50px;
            border-radius: 10px; font-size: 24px; font-weight: bold; cursor: pointer;
        }
        .qty-input {
            width: 100px; height: 50px; font-size: 24px; font-family: 'Poppins', sans-serif;
            font-weight: 700; color: #1e293b; text-align: center; border: 2px solid #cbd5e1; border-radius: 10px;
        }
        .summary-text { font-size: 22px; font-weight: 600; color: #1e293b; margin-top: 15px; }
        .summary-text span { color: #2e7d32; font-size: 28px; font-weight: 700; }
    </style>
</head>
<body>

    <header>
        <div class="container nav-content">
            <a href="index.html" class="logo">📦 Kartonexplus-wypełniacze</a>
            <a href="index.html" class="btn" style="background-color: #2e7d32 !important; color: #ffffff !important;">Powrót</a>
        </div>
    </header>

    <main class="container" style="padding: 60px 20px; max-width: 800px;">
        <div class="box" style="text-align: center; background: #ffffff; padding: 35px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            
            <h2>Bezpieczna Płatność Online</h2>
            <p style="color: #555;">Użyj plusa i minusa, aby wybrać wagę paczki.</p>
            
            <div class="qty-picker-container">
                <div class="qty-title">Ilość wypełniacza (w kg):</div>
                <div class="qty-wrapper">
                    <button type="button" class="qty-control-btn" onclick="changeQty(-1)">-</button>
                    <input type="number" id="weight-input" class="qty-input" value="1" min="1" max="10" readonly>
                    <button type="button" class="qty-control-btn" onclick="changeQty(1)">+</button>
                </div>
                <div class="summary-text">
                    Razem do zapłaty: <span id="price-display">3 zł</span>
                </div>
            </div>
            
            <button type="button" onclick="redirectToStripe()" style="display: block; width: 100%; padding: 18px 0; font-size: 20px; font-family: 'Poppins', sans-serif; font-weight: 600; background-color: #2e7d32; color: #ffffff; border-radius: 8px; border: none; cursor: pointer;">
                🛒 Przejdź do płatności (Karta / BLIK)
            </button>
            
        </div>
    </main>

    <script>
        const input = document.getElementById('weight-input');

        const stripeLinks = {
            1: "https://buy.stripe.com/test_cNi28qbch9vNbbM4S5e7m02", // Twój obecny link na 3zł
            2: "TUTAJ_LINK_DLA_2KG", 
            3: "TUTAJ_LINK_DLA_3KG",
            4: "TUTAJ_LINK_DLA_4KG",
            5: "TUTAJ_LINK_DLA_5KG",
            6: "TUTAJ_LINK_DLA_6KG",
            7: "https://buy.stripe.com/test_dRmeVc4NT0Zh5Rs3O1e7m03",
            8: "TUTAJ_LINK_DLA_8KG",
            9: "TUTAJ_LINK_DLA_9KG",
            10: "TUTAJ_LINK_DLA_10KG"
        };

        function changeQty(amount) {
            let currentVal = parseInt(input.value) || 1;
            let newVal = currentVal + amount;
            if (newVal >= 1 && newVal <= 10) {
                input.value = newVal;
                document.getElementById('price-display').innerText = (newVal * 3) + " zł";
            }
        }

        function redirectToStripe() {
            let qty = input.value;
            let url = stripeLinks[qty];
            if(url && url !== "TUTAJ_LINK_DLA_2KG") {
                window.location.href = url;
            } else {
                alert("Ten krok wymaga wklejenia właściwego linku Stripe dla " + qty + " kg w kodzie strony!");
            }
        }
    </script>
</body>
</html>
